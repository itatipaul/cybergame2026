version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Mount entire app directory for code changes
      - .:/app
      # Mount node_modules as a separate volume to avoid overwriting
      - ./node_modules:/app/node_modules
    working_dir: /app
    command: npm start
