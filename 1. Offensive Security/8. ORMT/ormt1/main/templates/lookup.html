{% load static %}
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookworms Bookstore</title>
</head>
<body>
    {% include 'navbar.html' %}
    <main class="page-content">
    <div class="d-flex flex-column flex-md-row lookup-row">
        <div class="d-flex flex-column navbar_colored gap-3 ps-4 pe-4 align-items-start lookup-left">
            <h2>Book search</h2>
            <form class="d-flex flex-column gap-3 align-items-start w-100" method="POST">
                <input class="form-control" name="title__icontains" placeholder="Title">
                <input class="form-control" name="price" placeholder="Price">
                <button class="btn" type="submit">Search</button>
            </form>
        </div>
        <div class="d-flex flex-row flex-fill" style="min-height:0;">
            <div class="book_holder d-flex flex-column flex-grow-1">
                <div class="book-grid">
                    {% for book in books %}
                        <div class="book_card">
                            <img class="book-img" src="/static/{{ book.picture }}" alt="{{ book.title }}">
                            <div class="book-meta">
                                <div class="book-title">{{ book.title }}</div>
                                <div class="book-price">{{ book.price }}$</div>
                            </div>
                            <a class="btn" href="/details?id={{ book.id }}">See Details</a>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    </main>
    <footer class="site-footer">
        <div class="container py-4">
            <div class="row">
                <div class="col-md-4">
                    <h5>Bookworms</h5>
                    <p class="text-muted small">Find your next great read.</p>
                </div>
                <div class="col-md-4">
                    <h6>Pages</h6>
                    <ul class="list-unstyled footer-links">
                        <li><a href="#">Home</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Catalog</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h6>Legal</h6>
                    <ul class="list-unstyled footer-links">
                        <li><a href="#">Privacy</a></li>
                        <li><a href="#">Terms</a></li>
                        <li><a href="#">Help</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
</body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link rel="stylesheet" href="{% static 'styles.css' %}">
