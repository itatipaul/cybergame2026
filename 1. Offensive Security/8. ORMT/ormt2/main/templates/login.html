{% load static %}
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login</title>
	<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
	<div class="login-wrapper page-content">
		<div class="login-box">
			<h2 class="site-title">Bookworms bookstore</h2>
			<h1 class="section-title">Welcome, please login</h1>
			<form method="post">
				<input name="username" type="text" placeholder="Username" autocomplete="username" required />
				<input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
				<div class="auth-actions">
					<button class="btn btn-login" type="submit">Login</button>
					<span class="or-sep">or</span>
					<button href="/signup" type="button" class="btn btn-login" onclick="location.href='/signup'">Sign up</button>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
