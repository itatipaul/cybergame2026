<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>googleproxy</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f8f3e8;
        --mist: #dbe7df;
        --ink: #172127;
        --muted: #5f6d73;
        --accent: #0c7a43;
        --accent-strong: #095c33;
        --line: rgba(23, 33, 39, 0.12);
        --panel: rgba(255, 252, 246, 0.84);
        --shadow: 0 30px 80px rgba(18, 30, 32, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, rgba(12, 122, 67, 0.18), transparent 0 24%),
          radial-gradient(circle at 85% 15%, rgba(201, 145, 72, 0.18), transparent 0 18%),
          linear-gradient(135deg, var(--paper) 0%, #efe7d7 45%, var(--mist) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(23, 33, 39, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 33, 39, 0.03) 1px, transparent 1px);
        background-size: 22px 22px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 88%);
        pointer-events: none;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .card {
        position: relative;
        width: min(920px, 100%);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: auto -8% 0 auto;
        width: 260px;
        aspect-ratio: 1;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(12, 122, 67, 0.24), transparent 68%);
        pointer-events: none;
      }

      .hero {
        display: grid;
        gap: 28px;
        padding: 34px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif;
        font-size: 0.82rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 8vw, 6rem);
        line-height: 0.9;
        letter-spacing: -0.06em;
      }

      .subtitle {
        margin: 0;
        max-width: 39rem;
        font-size: 1.08rem;
        line-height: 1.75;
        color: var(--muted);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .meta span {
        border: 1px solid rgba(12, 122, 67, 0.18);
        border-radius: 999px;
        padding: 8px 12px;
        font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif;
        font-size: 0.84rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-strong);
        background: rgba(255, 255, 255, 0.55);
      }

      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: 1.2fr 0.8fr;
        align-items: start;
      }

      .panel,
      .notes {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.62);
      }

      .panel {
        padding: 22px;
      }

      .notes {
        padding: 20px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label,
      .notes h2 {
        margin: 0;
        font-family: "Avenir Next Condensed", "Arial Narrow", sans-serif;
        font-size: 0.88rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 14px;
        font: inherit;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.92);
      }

      input:focus {
        outline: 2px solid rgba(12, 122, 67, 0.18);
        border-color: rgba(12, 122, 67, 0.35);
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        font: inherit;
        color: #fdf8f0;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        box-shadow: 0 14px 24px rgba(12, 122, 67, 0.24);
        cursor: pointer;
      }

      .help,
      .notes p,
      .notes li {
        color: var(--muted);
        line-height: 1.65;
      }

      .help {
        margin: 0;
        font-size: 0.96rem;
      }

      .notes ul {
        margin: 14px 0 0;
        padding-left: 18px;
      }

      code {
        padding: 0.15rem 0.45rem;
        border-radius: 8px;
        background: rgba(23, 33, 39, 0.07);
        font-size: 0.95em;
      }

      @media (max-width: 760px) {
        .hero {
          padding: 24px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <main class="card">
        <section class="hero">
          <div>
            <h1>googleproxy</h1>
          </div>


          <div class="meta">
            <span>Google Host Filter</span>
            <span>Response Passthrough</span>
            <span>giga!</span>
            <span>Google Host Filter</span>
          </div>

          <div class="grid">
            <section class="panel">
              <form action="/proxy" method="get">
                <label for="url">Google URL</label>
                <input id="url" name="url" type="url" placeholder="https://www.google.com/" required>
                <button type="submit">Fetch Upstream</button>
              </form>
            </section>

            <aside class="notes">
              <h2>Quick Notes</h2>
              <p>
                Try a full URL such as <code>https://www.google.com/</code> or a specific Google path.
              </p>
              <ul>
                <li>Public endpoint: <code>/proxy?url=...</code></li>
                <li>Health check: <code>/healthz</code></li>
              </ul>
            </aside>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
